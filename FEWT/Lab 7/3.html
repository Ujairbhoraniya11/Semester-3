<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = parseFloat(prompt("Enter Number : "))

        let floornum = Math.floor(num)
        let ceilingnum = Math.ceil(num)

        let roundnum = Math.round(num)
        let truncatenum = Math.trunc(num)

        document.write("Floornum = " + floornum + "<br>")
        document.write("Ceilingnum = " + ceilingnum + "<br>")
        document.write("Roundnum = " + roundnum + "<br>")
        document.write("Truncatenum = " + truncatenum)

    </script>
</body>
</html>
