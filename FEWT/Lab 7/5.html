<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let BirthYear = parseInt(prompt("Enter BirthYear : "))
        let now = new Date()

        let diff = now.getFullYear() - BirthYear

        document.write("Age : " + diff)

    </script>
</body>
</html>
