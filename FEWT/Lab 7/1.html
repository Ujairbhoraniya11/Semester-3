<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num1 = parseInt(prompt("Enter First Number : "))
        let num2 = parseInt(prompt("Enter Second Number : "))

        let maximum = Math.max(num1, num2)
        let minimum = Math.min(num1, num2)

        let num1_absolute = Math.abs(num1)
        let num2_absolute = Math.abs(num2)

        document.write("Maximum = " + maximum + "<br>")
        document.write("Minimum = " + minimum + "<br>")
        document.write(num1 + " Absolute = " + num1_absolute + "<br>")
        document.write(num2 + " Absolute = " + num2_absolute)

    </script>
</body>
</html>
