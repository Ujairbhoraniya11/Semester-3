<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let now = new Date();
        document.write("Date = " + now.getDate()  + "<br>")
        document.write("Time = HH:MM:SS : " + now.getHours()+":"+now.getMinutes()+":"+now.getSeconds()  + "<br>")
        document.write("Day = " + now.getDay()  + "<br>")
        document.write("Month = " + (now.getMonth()+1)  + "<br>")
        document.write("Year = " + now.getFullYear()  + "<br>")
    </script>
</body>
</html>
